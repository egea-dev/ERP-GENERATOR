services:
  db:
    image: ankane/pgvector:latest
    container_name: erp-db
    restart: unless-stopped
    ports:
      - "${DB_PORT_BIND:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-erp_generator}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/00_standalone_postgres.sql:/docker-entrypoint-initdb.d/00_standalone_postgres.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tailscale:
    image: tailscale/tailscale:latest
    container_name: erp-tailscale
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?}
      TS_HOSTNAME: ${TS_HOSTNAME:-erp-backend-ai}
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---advertise-tags=tag:erp-ai}
      TS_OUTBOUND_HTTP_PROXY_LISTEN: ${TS_OUTBOUND_HTTP_PROXY_LISTEN:-:1055}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
    volumes:
      - tailscale_state:/var/lib/tailscale
    expose:
      - "1055"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT_BIND:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-erp_generator}
      JWT_SECRET: ${JWT_SECRET:-erp-generator-secret-key-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-lmstudio}
      LMSTUDIO_DEFAULT_MODEL: ${LMSTUDIO_DEFAULT_MODEL:-local-model}
      LMSTUDIO_PROXY_URL: ${LMSTUDIO_PROXY_URL:-http://tailscale:1055}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.70}
      LMSTUDIO_URL: ${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      TARIFAS_API_BASE_URL: ${TARIFAS_API_BASE_URL:-http://host.docker.internal:8001/api/external/v1}
      TARIFAS_API_KEY: ${TARIFAS_API_KEY:-dev-external-api-key}
      URLGEN_DISPLAY_BASE_PATH: '${URLGEN_DISPLAY_BASE_PATH:-P:\PROYECTOS}'
    depends_on:
      db:
        condition: service_healthy
      tailscale:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT_BIND:-5173}:80"
    depends_on:
      - tailscale
      - backend

volumes:
  pgdata:
  tailscale_state:
